name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install tkinterdnd2   # your optional drag-and-drop library

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name inidiff inidiff.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: inidiff-exe
          path: dist/inidiff.exe