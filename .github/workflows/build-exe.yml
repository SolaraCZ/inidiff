name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install tkinterdnd2

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name inidiff inidiff.py

      - name: Package source code
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          $sourceItems = Get-ChildItem -Force | Where-Object { $_.Name -notin @('.git', 'dist', 'build', 'release-artifacts') }
          Compress-Archive -Path $sourceItems.FullName -DestinationPath release-artifacts/inidiff-source.zip -Force

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            This release is automatically updated with every push to `main`.
            It contains the latest development version of inidiff.
          prerelease: true
          files: |
            dist/inidiff.exe
            release-artifacts/inidiff-source.zip